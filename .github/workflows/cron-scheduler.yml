name: Calendar + Task Scheduler

# Lightweight, frequent job: sync Google Calendar + Calendly, re-propose task
# blocks, push approved blocks to Google Calendar, and rebook missed ones.
# Runs in the cloud — no dependency on any local machine.

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours (UTC)
  workflow_dispatch: {}       # manual "Run workflow" button

concurrency:
  group: cron-scheduler
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: America/Vancouver   # scheduler windows (9–5 etc.) use local time
      GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      CALENDLY_TOKEN:       ${{ secrets.CALENDLY_TOKEN }}
      CALENDAR_ACCOUNT:     ${{ secrets.CALENDAR_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Restore accounts.json (Google refresh tokens)
        run: printf '%s' "$ACCOUNTS_JSON" > agents/accounts.json
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
      - name: Install deps
        working-directory: agents
        run: npm ci --omit=dev || npm install --omit=dev
      - name: Run calendar sync + scheduler
        working-directory: agents
        run: node orchestrator.js --calendar
