<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; width: 512px; height: 512px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2926"/>
      <stop offset="100%" stop-color="#161412"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Top accent arrow -->
  <path d="M224 90 L256 54 L288 90" fill="none" stroke="#f7f5f1" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <!-- RP initials -->
  <text x="256" y="352" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="288" fill="#f7f5f1">
    <tspan font-style="italic" dx="-5">R</tspan><tspan dx="-32">P</tspan>
  </text>
  <!-- Bottom rule -->
  <line x1="150" y1="428" x2="362" y2="428" stroke="#f7f5f1" stroke-width="10" opacity="0.4"/>
  <circle cx="150" cy="428" r="9" fill="#f7f5f1" opacity="0.6"/>
  <circle cx="362" cy="428" r="9" fill="#f7f5f1" opacity="0.6"/>
</svg>
</body>
</html>
